<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyDigest</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            max-width: 768px;
            margin: 0 auto;
            padding: 16px;
        }

        h1 {
            font-size: 1.4rem;
            color: #ffffff;
            padding: 16px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 24px;
        }

        h2 {
            font-size: 0.85rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin: 32px 0 12px;
        }

        .article {
            background-color: #242424;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .article a {
            color: #e0e0e0;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.4;
        }

        .article a:hover {
            color: #ffffff;
        }

        .article p {
            color: #999;
            font-size: 0.875rem;
            line-height: 1.5;
            margin-top: 8px;
        }

        .article small {
            display: inline-block;
            margin-top: 10px;
            font-size: 0.75rem;
            color: #666;
            background-color: #333;
            padding: 2px 8px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>📰 DailyDigest</h1>
    {% for category, articles in categorized.items() %}
        <h2>{{ category }}</h2>
        {% for article in articles %}
            <div class="article">
                <a href="{{ article.link }}" target="_blank">{{ article.title }}</a>
                <p>{{ article.summary }}</p>
                <small>{{ article.source }}</small>
            </div>
        {% endfor %}
    {% endfor %}
</body>
</html>
